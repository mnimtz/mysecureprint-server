# =============================================================================
# mysecureprint-server — local docker compose
# =============================================================================
# Schneller Start fuer lokales Testing oder kleine On-Prem-Setups.
# Fuer Azure App Service nutze deploy/azure/azuredeploy.json.
# =============================================================================

services:
  mysecureprint:
    image: ghcr.io/mnimtz/mysecureprint-server:latest
    # Lokal bauen statt Image ziehen:
    #   docker compose build
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mysecureprint-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      WEB_PORT: 8080
      MCP_LOG_LEVEL: info
      TZ: Europe/Berlin
      # Optional: oeffentliche URL fuer Pairing-Links (HTTPS-Reverse-Proxy
      # oder Cloudflare Tunnel davor)
      # MCP_PUBLIC_URL: https://print.example.com
    volumes:
      - mysecureprint-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  mysecureprint-data:
    driver: local
